<!DOCTYPE html>
<html>
<head>
    <title>Webpage Access Records</title>
</head>
<body>

<h1>Here are the access records</h1>

{% if access_records %}
    <table>
        <tr>
            <th>Webpage</th>
            <th>Date Accessed</th>
        </tr>

        {% for record in access_records %}
        <tr>
            <td>{{ record.name.name }}</td>
            <td>{{ record.date }}</td>
        </tr>
        {% endfor %}
    </table>
{% else %}
    <p>No records found.</p>
{% endif %}

</body>
</html>
